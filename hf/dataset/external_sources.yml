# External datasets are not vendored in this repository. Use their official
# releases and licenses when building larger eval or hidden splits.
sources:
  - name: PerMMLU
    hub_id: MCINext/permmlu
    suggested_tracks: [knowledge]
    notes: "Localized Persian multiple-choice knowledge benchmark."
  - name: Persian IFEval
    hub_id: MCINext/persian-ifeval
    suggested_tracks: [instruction]
    notes: "Instruction-following prompts with checkable constraints."
  - name: Persian MT-Bench
    hub_id: MCINext/persian-mt-bench
    suggested_tracks: [generation]
    notes: "Useful for optional judged generation, not included in automatic v1 scoring by default."
  - name: ParsiNLU
    hub_id: "persiannlp/parsinlu_*"
    suggested_tracks: [reading, short_qa]
    notes: "Use official task-specific releases and cite the original benchmark."
  - name: PerCul
    hub_id: teias-ai/percul
    suggested_tracks: [culture]
    notes: "Culture-oriented Persian benchmark; respect original dataset license and citation."
  - name: FarsEval-PKBETS
    hub_id: MatinaAI/pkbets
    suggested_tracks: [knowledge, culture]
    notes: "Persian knowledge and culturally relevant QA; use official release terms."
