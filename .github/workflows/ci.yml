name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Lint (Ruff)
        run: ruff check .
      - name: Format check (Ruff)
        run: ruff format --check .
      - name: Type check (mypy)
        run: mypy persian_eval
      - name: Validate seed datasets
        run: persian-eval validate --dataset data/persian_eval_v1.dev.jsonl data/persian_eval_v1.public_eval.jsonl data/persian_eval_v1.hard.jsonl
      - name: Run duplicate prompt check
        run: persian-eval leakage data/persian_eval_v1.dev.jsonl data/persian_eval_v1.public_eval.jsonl data/persian_eval_v1.hard.jsonl
      - name: Validate dataset quality
        run: python scripts/validate_dataset.py --strict-min-count data/persian_eval_v1.dev.jsonl data/persian_eval_v1.public_eval.jsonl data/persian_eval_v1.hard.jsonl
      - name: Run tests with coverage
        run: pytest --cov=persian_eval --cov-report=term-missing
      - name: Smoke run
        run: persian-eval run --model smoke --backend mock --data data/persian_eval_v1.dev.jsonl --output /tmp/smoke.json
      - name: Validate smoke result
        run: persian-eval validate /tmp/smoke.json
