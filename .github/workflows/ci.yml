name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Validate seed datasets
        run: persian-eval validate --dataset data/persian_eval_v1.dev.jsonl data/persian_eval_v1.public_eval.jsonl data/persian_eval_v1.hard.jsonl
      - name: Run duplicate prompt check
        run: persian-eval leakage data/persian_eval_v1.dev.jsonl data/persian_eval_v1.public_eval.jsonl data/persian_eval_v1.hard.jsonl
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Smoke run
        run: persian-eval run --model smoke --backend mock --data data/persian_eval_v1.dev.jsonl --output /tmp/smoke.json
      - name: Validate smoke result
        run: persian-eval validate /tmp/smoke.json
